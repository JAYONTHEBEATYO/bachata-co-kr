<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>bachata.co.kr</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #fff7ed;
        color: #111827;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 32px;
      }

      h1 {
        margin: 0;
        max-width: 1180px;
        font-size: clamp(52px, 10vw, 142px);
        line-height: 1.02;
        font-weight: 950;
        letter-spacing: 0;
        text-align: center;
        text-wrap: balance;
      }

      .insta {
        display: block;
        margin-top: 0.22em;
        color: #dc2626;
      }
    </style>
  </head>
  <body>
    <h1>
      라틴씨엘로 타로 홀딩 많이 해주세요.
      <span class="insta">insta - zumjersy 팔로우 많이 해주세요</span>
    </h1>
  </body>
</html>
