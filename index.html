<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>bachata.co.kr</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Arial Black", Impact, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #050816;
        color: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100svh;
        overflow: hidden;
        background:
          linear-gradient(180deg, rgba(5, 8, 22, 0.08), rgba(5, 8, 22, 0.15) 36%, rgba(5, 8, 22, 0.86) 78%),
          url("assets/zumjersy-party.jpeg") center top / cover no-repeat;
      }

      main {
        min-height: 100svh;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 28px;
      }

      .headline {
        margin: 0;
        width: min(1220px, 100%);
        font-size: clamp(44px, 8.5vw, 126px);
        line-height: 0.98;
        font-weight: 950;
        letter-spacing: 0;
        text-align: center;
        text-wrap: balance;
        color: #fff;
        text-shadow:
          0 5px 0 #08111f,
          0 0 16px #00e5ff,
          0 0 34px #ff2fd6,
          0 0 58px rgba(255, 47, 214, 0.8);
        transform: rotate(-1.4deg);
      }

      .insta {
        display: inline-block;
        margin-top: 0.12em;
        padding: 0.04em 0.18em 0.08em;
        color: #fff200;
        background: #ff2f92;
        border: 6px solid #ffffff;
        border-radius: 18px;
        box-shadow:
          0 8px 0 #14071d,
          0 0 26px rgba(255, 47, 146, 0.9);
        text-shadow: 0 4px 0 #141414;
      }

      .spark {
        position: fixed;
        inset: auto 18px 18px auto;
        width: min(160px, 24vw);
        aspect-ratio: 1;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(255, 242, 0, 0.85), rgba(255, 47, 146, 0.24) 48%, transparent 70%);
        filter: blur(2px);
        pointer-events: none;
        mix-blend-mode: screen;
      }

      @media (max-width: 720px) {
        body {
          background-position: center top;
        }

        main {
          padding: 18px 14px 24px;
        }

        .headline {
          font-size: clamp(38px, 14vw, 76px);
          text-shadow:
            0 4px 0 #08111f,
            0 0 12px #00e5ff,
            0 0 24px #ff2fd6;
        }

        .insta {
          border-width: 4px;
          border-radius: 12px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 class="headline">
        라틴씨엘로 타로<br>
        홀딩 많이 해주세요
        <span class="insta">@zumjersy 팔로우 많이 해주세요</span>
      </h1>
    </main>
    <div class="spark"></div>
  </body>
</html>
