name: Style reference RAG

on:
  schedule:
    - cron: "30 20 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  style-rag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build style reference archive
        run: |
          node tools/style-rag/init-style-db.mjs
          node tools/style-rag/ingest-style-references.mjs
          node tools/style-rag/export-style-json.mjs

      - name: Commit style reference export
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated/style-reference-index.json
          if git diff --cached --quiet; then
            echo "No style reference changes to commit"
          else
            git commit -m "Update style reference RAG"
            git push
          fi
