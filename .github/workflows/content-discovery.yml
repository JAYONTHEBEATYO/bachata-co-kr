name: Site verification

on:
  schedule:
    - cron: "10 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Verify site
        run: npm run verify

      - name: Verify Cloudflare bundle
        run: npm run cf:build
