name: Content discovery

on:
  schedule:
    - cron: "10 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect scene signals
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          INSTAGRAM_GRAPH_TOKEN: ${{ secrets.INSTAGRAM_GRAPH_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node tools/collect-scene-signals.mjs

      - name: Build daily brief
        run: node tools/build-daily-brief.mjs

      - name: Commit generated discovery data and brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated/scene-signals.json data/generated/latest-brief.json briefs sitemap.xml
          if git diff --cached --quiet; then
            echo "No discovery changes to commit"
          else
            git commit -m "Update bachata scene brief"
            git push
            curl -L -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"
          fi
