name: Content discovery

on:
  schedule:
    - cron: "10 20 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Collect scene signals
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          INSTAGRAM_GRAPH_TOKEN: ${{ secrets.INSTAGRAM_GRAPH_TOKEN }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: node tools/collect-scene-signals.mjs

      - name: Build article library
        run: node tools/build-articles.mjs

      - name: Build style guides
        run: node tools/build-style-guides.mjs

      - name: Build programs
        run: node tools/build-programs.mjs

      - name: Build editorial desk
        run: node tools/build-editorial-desk.mjs

      - name: Build profiles
        run: node tools/build-profiles.mjs

      - name: Build community board
        run: node tools/build-board.mjs

      - name: Build submission center
        run: node tools/build-submissions.mjs

      - name: Build event radar
        run: node tools/build-events.mjs

      - name: Build social radar
        run: node tools/build-social-radar.mjs

      - name: Build gear guide
        run: node tools/build-gear.mjs

      - name: Audit source health
        run: node tools/audit-sources.mjs

      - name: Build daily brief
        run: node tools/build-daily-brief.mjs

      - name: Commit generated discovery data and brief
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/generated/scene-signals.json data/generated/latest-brief.json data/generated/article-index.json data/generated/style-index.json data/generated/program-index.json data/generated/editorial-desk-index.json data/generated/profile-index.json data/generated/board-index.json data/generated/submission-index.json data/generated/event-index.json data/generated/social-radar-index.json data/generated/gear-index.json data/generated/source-health.json articles styles programs desk profiles briefs community submit events radar gear health sitemap.xml
          if git diff --cached --quiet; then
            echo "No discovery changes to commit"
          else
            git commit -m "Update bachata scene brief"
            HEAD_SHA="$(git rev-parse HEAD)"
            git push
            for i in {1..12}; do
              REMOTE_SHA="$(git ls-remote origin refs/heads/main | awk '{print $1}')"
              if [ "$REMOTE_SHA" = "$HEAD_SHA" ]; then
                break
              fi
              sleep 5
            done
            curl -fsSL -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${GITHUB_REPOSITORY}/pages/builds"
          fi
